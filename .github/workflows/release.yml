name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/cantonjs-splice-interfaces/package-lock.json
            packages/cantonjs-splice-scan/package-lock.json
            packages/cantonjs-splice-token-standard/package-lock.json
            packages/cantonjs-splice-validator/package-lock.json
            packages/cantonjs-wallet-adapters/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Splice package dependencies
        run: |
          npm --prefix packages/cantonjs-splice-interfaces ci
          npm --prefix packages/cantonjs-splice-scan ci
          npm --prefix packages/cantonjs-splice-validator ci
          npm --prefix packages/cantonjs-splice-token-standard ci
          npm --prefix packages/cantonjs-wallet-adapters ci

      - name: Verify vendored Splice artifacts
        run: npm run verify:splice-artifacts

      - name: Verify generated Splice artifacts
        run: npm run verify:generated-artifacts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Size check
        run: npm run size

      - name: Validate Splice packages
        run: npm run test:packages

  publish-core:
    name: Publish cantonjs
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-codegen:
    name: Publish cantonjs-codegen
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: packages/cantonjs-codegen
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: packages/cantonjs-codegen
        run: npm run build

      - name: Publish
        working-directory: packages/cantonjs-codegen
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-react:
    name: Publish cantonjs-react
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: packages/cantonjs-react
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: packages/cantonjs-react
        run: npm run build

      - name: Publish
        working-directory: packages/cantonjs-react
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub Release
    needs: [publish-core, publish-codegen, publish-react]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
