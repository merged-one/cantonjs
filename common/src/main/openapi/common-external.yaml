openapi: 3.0.0
info:
  title: Splice Common External Support
  version: 0.0.0
paths:
  /readyz:
    get:
      operationId: readyz
      responses:
        "200":
          description: ok
          content:
            text/plain:
              schema:
                type: string
  /livez:
    get:
      operationId: livez
      responses:
        "200":
          description: ok
          content:
            text/plain:
              schema:
                type: string
  /status:
    get:
      operationId: status
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /version:
    get:
      operationId: version
      responses:
        "200":
          description: ok
          content:
            text/plain:
              schema:
                type: string
components:
  responses:
    "400":
      description: bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    "404":
      description: not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    "500":
      description: internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    "501":
      description: not implemented
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ContractId:
      type: string
    Contract:
      type: object
      properties:
        contract_id:
          $ref: "#/components/schemas/ContractId"
        template_id:
          type: string
        package_name:
          type: string
        payload:
          type: object
          additionalProperties: true
      additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
      additionalProperties: true
